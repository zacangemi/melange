name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build macOS ARM64
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build release binary
        run: cargo build --release --target aarch64-apple-darwin --jobs 4

      - name: Package binary
        run: |
          cd target/aarch64-apple-darwin/release
          tar -czf melange-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz melange
          mv melange-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz ../../../

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: melange-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz
          generate_release_notes: true
